<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFC Card Studio</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/card.css" />
</head>

<body data-route="boot">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app-shell app-shell--dashboard">
    <header class="topbar topbar--dashboard glass">
      <div class="topbar__brand-block">
        <div class="brand-wrap topbar__brand">
          <div class="topbar__brand-copy">
            <h1>AFC Card Studio</h1>
            <p class="topbar__subtitle">Crée, ouvre, collectionne.</p>
          </div>
        </div>
      </div>

      <div class="topbar__nav-block glass-soft">
        <nav class="site-nav" aria-label="Navigation principale">
          <a class="nav-link nav-link--studio" href="./?page=creator" data-route="creator">
            <span class="nav-link__content">
              <strong>Créer</strong>
            </span>
          </a>
          <a class="nav-link nav-link--booster" href="./?page=booster" data-route="booster">
            <span class="nav-link__content">
              <strong>Booster</strong>
            </span>
          </a>
          <a class="nav-link nav-link--album" href="./?page=album" data-route="album">
            <span class="nav-link__content">
              <strong>Album</strong>
            </span>
          </a>
          <a class="nav-link nav-link--admin" href="./?page=admin" data-admin-link="true" data-route="admin" hidden>
            <span class="nav-link__content">
              <strong>Admin</strong>
            </span>
          </a>
        </nav>
      </div>

      <section class="auth-actions auth-actions--topbar glass-soft">
        <div class="auth-menu" data-auth-menu>
          <button
            id="authMenuTrigger"
            class="auth-menu__trigger"
            type="button"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span class="auth-menu__identity">
              <span id="authStatus">Chargement…</span>
              <span id="userRoleBadge" class="role-badge" hidden></span>
            </span>
            <span class="auth-menu__chevron" aria-hidden="true">▾</span>
          </button>

          <div id="authMenuPanel" class="auth-menu__panel" role="menu" aria-hidden="true" hidden>
            <a class="auth-menu__item" href="./?page=profile" data-route="profile" role="menuitem">Profil</a>
            <button id="logout" type="button" class="auth-menu__item auth-menu__item--button" role="menuitem">Déconnexion</button>
          </div>
        </div>

        <div class="auth-actions__buttons auth-actions__buttons--inline">
          <button id="googleLogin" type="button">Connexion</button>
        </div>
      </section>
    </header>

    <div id="appWorkspace" class="app-workspace">
      <div class="workspace-frame glass-soft" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="app" class="app-view" aria-live="polite"></div>
    </div>
  </div>

  <template id="loginViewTemplate">
    <main class="login-layout login-layout--revamp">
      <section class="panel glass login-panel">
        <div class="login-shell login-shell--solo">
          <article class="glass-soft login-card login-card--featured login-card--solo">
            <div class="panel-heading panel-heading--compact">
              <div>
                <h2>Connexion</h2>
              </div>
            </div>

            <p id="loginState" class="login-state">Connecte-toi avec Google.</p>
            <p id="loginHint" class="hint">Le pseudo sera demandé si besoin.</p>

            <div id="nicknameStep" class="nickname-step" hidden>
              <label>Pseudo
                <input id="nickname" type="text" maxlength="24" placeholder="Pseudo" />
              </label>
              <button id="saveNickname" type="button">Continuer</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </template>

  <script type="module" src="assets/js/router.js"></script>
</body>

</html>
