<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFC Card Studio · Création</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <header class="topbar glass">
    <div>
      <p class="kicker">AFC Universe</p>
      <h1>AFC Card Studio</h1>
    </div>

    <nav class="site-nav">
      <a class="nav-link active" href="index.html">Créer</a>
      <a class="nav-link" href="profile.html">Profil</a>
      <a class="nav-link" href="admin.html">Admin</a>
    </nav>

    <div class="auth-actions">
      <span id="authStatus">Vérification...</span>
      <button id="googleLogin" type="button">Connexion Google</button>
      <button id="logout" type="button" class="ghost">Déconnexion</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel glass">
      <h2>Créer une carte</h2>
      <p class="subtitle">Expérience simplifiée, prévisualisation live, stats auto et soumission en 1 clic.</p>

      <form id="cardForm" class="editor-form">
        <label>Nom
          <input id="name" type="text" maxlength="24" value="Fémi-Mars" required />
        </label>

        <label>Rôle
          <select id="title" required>
            <option>Responsable staff</option>
            <option>Gardien de l'AFC</option>
            <option>Streamers</option>
            <option>Viewers</option>
          </select>
        </label>

        <label>Édition
          <input id="edition" type="text" value="2e édition" readonly />
        </label>

        <label>Capacités
          <textarea id="abilities" rows="4" required></textarea>
        </label>

        <label>Photo (JPG / JPEG / WEBP)
          <input id="imageInput" type="file" accept=".jpg,.jpeg,.webp,image/jpeg,image/webp" />
        </label>

        <div class="actions">
          <button type="button" id="rollStats">Générer attaque / défense</button>
          <button type="button" id="submitCard">Envoyer en vérification</button>
          <button type="button" id="downloadCard">Télécharger la carte</button>
        </div>
      </form>
    </section>

    <section class="preview-wrap">
      <article class="afc-card rank-D" id="afcCard">
        <div class="holo"></div>
        <header class="card-header">
          <div class="meta-left">
            <span id="cardCost">2</span>
            <small id="cardEdition">2e édition</small>
          </div>
          <div class="identity">
            <p class="kicker" id="cardTypeTop">équilibré</p>
            <h3 id="cardName">Fémi-Mars</h3>
            <p id="cardTitle">Responsable staff</p>
          </div>
          <div class="meta-right">
            <span id="cardRank">C</span>
            <small id="cardAverage">32</small>
          </div>
        </header>

        <div class="portrait-shell">
          <div class="portrait" id="portrait"></div>
        </div>

        <section class="skills">
          <h4>Capacités</h4>
          <p id="cardAbilities"></p>
        </section>

        <footer class="stats">
          <div>
            <strong>⚔</strong>
            <span id="attack">0</span>
          </div>
          <div>
            <strong>🛡</strong>
            <span id="defense">0</span>
          </div>
          <div>
            <strong>Type</strong>
            <span id="cardType">-</span>
          </div>
        </footer>

        <span class="serial" id="cardSerial">--/--</span>
      </article>
    </section>
  </main>

  <script type="module" src="assets/js/create.js"></script>
</body>

</html>
