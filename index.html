<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFC Card Studio</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/card.css" />
</head>

<body data-route="boot">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app-shell app-shell--command">
    <aside class="command-sidebar glass" aria-label="Navigation principale AFC Card Studio">
      <div class="command-sidebar__brand">
        <div class="brand-wrap topbar__brand">
          <div class="topbar__brand-copy">
            <h1>AFC Card Studio</h1>
            <p class="topbar__subtitle">Crée, ouvre, collectionne.</p>
          </div>
        </div>
      </div>

      <div class="command-sidebar__nav glass-soft">
        <nav class="site-nav site-nav--command" aria-label="Navigation principale">
          <a class="nav-link nav-link--studio" href="./?page=creator" data-route="creator">
            <span class="nav-link__content">
              <strong>Créer</strong>
            </span>
          </a>
          <a class="nav-link nav-link--booster" href="./?page=booster" data-route="booster">
            <span class="nav-link__content">
              <strong>Booster</strong>
            </span>
          </a>
          <a class="nav-link nav-link--album" href="./?page=album" data-route="album">
            <span class="nav-link__content">
              <strong>Album</strong>
            </span>
          </a>
          <a class="nav-link nav-link--profile" href="./?page=profile" data-route="profile">
            <span class="nav-link__content">
              <strong>Profil</strong>
            </span>
          </a>
          <a class="nav-link nav-link--admin" href="./?page=admin" data-admin-link="true" data-route="admin" hidden>
            <span class="nav-link__content">
              <strong>Admin</strong>
            </span>
          </a>
        </nav>
      </div>

      <section class="auth-actions auth-actions--sidebar glass-soft">
        <div class="auth-identity">
          <div class="auth-identity__copy">
            <span id="authStatus">Chargement…</span>
          </div>
        </div>

        <div class="auth-actions__buttons auth-actions__buttons--stacked">
          <button id="googleLogin" type="button">Connexion Google</button>
          <button id="logout" type="button" class="ghost">Déconnexion</button>
        </div>
      </section>
    </aside>

    <section class="command-stage">
      <header class="topbar topbar--command glass-soft">
        <div class="topbar__headline">
          <div class="topbar__headline-copy">
            <h2>AFC Card Studio</h2>
            <p class="topbar__subtitle">Crée, ouvre, collectionne.</p>
          </div>
        </div>
      </header>

      <div id="appWorkspace" class="app-workspace app-workspace--command">
        <div class="workspace-frame workspace-frame--command glass-soft" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div id="app" class="app-view app-view--command" aria-live="polite"></div>
      </div>
    </section>
  </div>

  <template id="loginViewTemplate">
    <main class="login-layout login-layout--revamp login-layout--command">
      <section class="panel glass login-panel login-panel--command">
        <div class="login-shell login-shell--solo">
          <article class="glass-soft login-card login-card--featured login-card--solo">
            <div class="panel-heading panel-heading--compact">
              <div>
                <h2>Connexion</h2>
              </div>
            </div>

            <p id="loginState" class="login-state">Connecte-toi avec Google.</p>
            <p id="loginHint" class="hint">Le pseudo sera demandé si besoin.</p>

            <div id="nicknameStep" class="nickname-step" hidden>
              <label>Pseudo
                <input id="nickname" type="text" maxlength="24" placeholder="Pseudo" />
              </label>
              <button id="saveNickname" type="button">Continuer</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </template>

  <script type="module" src="assets/js/router.js"></script>
</body>

</html>
