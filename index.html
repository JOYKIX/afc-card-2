<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFC Card Studio</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/card.css" />
  <style>
    body:not(.app-ready) {
      visibility: hidden;
    }
  </style>
</head>

<body data-route="boot">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="app-shell app-shell--dashboard">
    <header class="topbar topbar--dashboard glass">
      <div class="topbar__brand-block">
        <div class="brand-wrap topbar__brand">
          <div class="topbar__brand-copy">
            <p class="kicker">AFC Universe</p>
            <h1>AFC Card Studio</h1>
          </div>
        </div>
      </div>

      <div class="topbar__nav-block glass-soft">
        <nav class="site-nav" aria-label="Navigation principale">
          <a class="nav-link nav-link--studio" href="./?page=creator" data-route="creator">
            <span class="nav-link__content">
              <span class="nav-link__eyebrow">Studio</span>
              <strong>Créer</strong>
            </span>
          </a>
          <a class="nav-link nav-link--booster" href="./?page=booster" data-route="booster">
            <span class="nav-link__content">
              <span class="nav-link__eyebrow">Collection</span>
              <strong>Booster</strong>
            </span>
          </a>
          <a class="nav-link nav-link--album" href="./?page=album" data-route="album">
            <span class="nav-link__content">
              <span class="nav-link__eyebrow">Collection</span>
              <strong>Album</strong>
            </span>
          </a>
          <a class="nav-link nav-link--profile" href="./?page=profile" data-route="profile">
            <span class="nav-link__content">
              <span class="nav-link__eyebrow">Compte</span>
              <strong>Profil</strong>
            </span>
          </a>
          <a class="nav-link nav-link--admin" href="./?page=admin" data-admin-link="true" data-route="admin" hidden>
            <span class="nav-link__content">
              <span class="nav-link__eyebrow">Backoffice</span>
              <strong>Admin</strong>
            </span>
          </a>
        </nav>
      </div>

      <section class="auth-actions auth-actions--topbar glass-soft">
        <div class="auth-identity">
          <div class="auth-identity__copy">
            <span id="authStatus">Chargement instantané…</span>
          </div>
        </div>

        <div class="auth-actions__buttons auth-actions__buttons--inline">
          <button id="googleLogin" type="button">Connexion Google</button>
          <button id="logout" type="button" class="ghost">Déconnexion</button>
        </div>
      </section>
    </header>

    <div id="appWorkspace" class="app-workspace">
      <div class="workspace-frame glass-soft" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div id="app" class="app-view" aria-live="polite"></div>
    </div>
  </div>

  <template id="loginViewTemplate">
    <main class="login-layout login-layout--revamp">
      <section class="panel glass login-panel">
        <div class="login-shell">
          <div class="login-shell__intro glass-soft">
            <div class="panel-heading panel-heading--compact">
              <div>
                <p class="eyebrow">Bienvenue</p>
                <h2>Connecte-toi avant d’utiliser le studio</h2>
              </div>
              <p class="subtitle">Connexion Google, cache local instantané et navigation fluide sans rechargement.</p>
            </div>

            <article class="glass-soft login-copy login-copy--featured">
              <p class="eyebrow">Accès</p>
              <h3>Une connexion, puis retour direct dans l’app</h3>
              <ul class="feature-list">
                <li>Aucun rechargement de page.</li>
                <li>Retour immédiat au studio si la session locale existe.</li>
                <li>Synchronisation Firebase en arrière-plan.</li>
              </ul>
            </article>
          </div>

          <article class="glass-soft login-card login-card--featured">
            <p id="loginState" class="login-state">Connecte-toi avec Google pour accéder au site.</p>
            <p id="loginHint" class="hint">Ton pseudo sera demandé juste après la connexion si nécessaire, puis tes coins/jour seront synchronisés.</p>

            <div id="nicknameStep" class="nickname-step" hidden>
              <label>Pseudo
                <input id="nickname" type="text" maxlength="24" placeholder="Pseudo" />
              </label>
              <button id="saveNickname" type="button">Continuer avec ce pseudo</button>
            </div>
          </article>
        </div>
      </section>
    </main>
  </template>

  <script type="module" src="assets/js/router.js"></script>
</body>

</html>
