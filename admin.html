<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFC Card Studio · Admin</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <header class="topbar glass">
    <div>
      <p class="kicker">AFC Universe</p>
      <h1>Console Admin</h1>
    </div>

    <nav class="site-nav">
      <a class="nav-link" href="index.html">Créer</a>
      <a class="nav-link" href="profile.html">Profil</a>
      <a class="nav-link active" href="admin.html">Admin</a>
    </nav>

    <div class="auth-actions">
      <span id="authStatus">Vérification...</span>
      <button id="googleLogin" type="button">Connexion Google</button>
      <button id="logout" type="button" class="ghost">Déconnexion</button>
    </div>
  </header>

  <main class="single-layout">
    <section class="panel glass">
      <h2>Validation des cartes</h2>
      <p class="subtitle">Cette page est réservée aux comptes admin déclarés dans Firebase.</p>
      <div id="adminNotice" class="hint">Contrôle des droits...</div>
      <div id="pendingCards" class="pending-list"></div>
    </section>
  </main>

  <script type="module" src="assets/js/admin.js"></script>
</body>

</html>
