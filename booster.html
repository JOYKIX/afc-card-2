<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFC Card Studio · Booster</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <header class="topbar glass">
    <div>
      <p class="kicker">AFC Universe</p>
      <h1>Ouverture de booster</h1>
    </div>

    <nav class="site-nav">
      <a class="nav-link" href="index.html">Créer</a>
      <a class="nav-link active" href="booster.html">Booster</a>
      <a class="nav-link" href="profile.html">Profil</a>
      <a class="nav-link" href="admin.html" data-admin-link="true" hidden>Admin</a>
    </nav>

    <div class="auth-actions">
      <span id="authStatus">Vérification...</span>
      <button id="googleLogin" type="button">Connexion Google</button>
      <button id="logout" type="button" class="ghost">Déconnexion</button>
    </div>
  </header>

  <main class="single-layout">
    <section class="panel glass">
      <h2>Booster de 5 cartes</h2>
      <p class="subtitle">Nouveau booster: ouverture instantanée de 5 cartes déjà validées par la modération.</p>
      <div class="actions">
        <button id="openBooster" type="button">Ouvrir un booster</button>
      </div>
      <p id="boosterHint" class="hint">Prêt à découvrir ton tirage.</p>
      <section id="boosterGrid" class="booster-grid"></section>
    </section>
  </main>

  <script type="module" src="assets/js/booster.js"></script>
</body>

</html>
