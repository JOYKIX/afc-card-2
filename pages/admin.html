<main class="admin-layout admin-layout--revamp admin-layout--minimal">
  <section class="panel glass admin-main-panel admin-main-panel--revamp">
    <div class="panel-heading panel-heading--spread">
      <div>
        <h2>Validation</h2>
      </div>
    </div>

    <div class="status-banner" id="adminNotice">Contrôle des droits...</div>

    <div id="reviewStats" class="review-stats review-stats--hero review-stats--revamp">
      <article>
        <strong id="countPending">0</strong>
        <span>En attente</span>
      </article>
      <article>
        <strong id="countApproved">0</strong>
        <span>Validées</span>
      </article>
      <article>
        <strong id="countRejected">0</strong>
        <span>Refusées</span>
      </article>
    </div>

    <div class="admin-content-grid admin-content-grid--revamp">
      <section class="admin-focus glass-soft admin-focus--revamp" aria-labelledby="moderationTitle">
        <div class="section-head-inline">
          <div>
            <h3 id="moderationTitle">À modérer</h3>
          </div>
          <span class="section-pill">File active</span>
        </div>
        <section id="tinderReview" class="tinder-review tinder-review--revamp" aria-live="polite"></section>
      </section>

      <aside class="admin-sidebar admin-sidebar--revamp">
        <section class="role-manager glass-soft" aria-labelledby="roleManagerTitle">
          <div class="section-head-inline">
            <div>
              <h3 id="roleManagerTitle">Rôles</h3>
            </div>
          </div>
          <form id="roleForm" class="role-form role-form--revamp">
            <label>Nickname
              <input id="roleNickname" type="text" placeholder="Pseudo AFC" required />
            </label>
            <fieldset class="role-options">
              <legend>Rôles</legend>
              <label><input type="checkbox" name="roleOption" value="vip" /> VIP</label>
              <label><input type="checkbox" name="roleOption" value="streamers" /> Streamers</label>
              <label><input type="checkbox" name="roleOption" value="staff afc" /> Staff AFC</label>
              <label><input type="checkbox" name="roleOption" value="creator" /> Créateur</label>
              <label><input type="checkbox" name="roleOption" value="admin" /> Admin</label>
              <label><input type="checkbox" name="roleOption" value="african king" /> African King</label>
            </fieldset>
            <button id="roleSubmit" type="submit">Mettre à jour</button>
          </form>
          <p id="roleFeedback" class="hint" aria-live="polite"></p>
        </section>

        <section class="role-manager glass-soft" aria-labelledby="accountManagerTitle">
          <div class="section-head-inline">
            <div>
              <h3 id="accountManagerTitle">Crédits & quota</h3>
            </div>
          </div>
          <form id="accountCreditForm" class="role-form role-form--revamp">
            <label>Nickname
              <input id="accountNickname" type="text" placeholder="Pseudo AFC" required />
            </label>
            <div class="form-grid form-grid--two">
              <label>Coins à ajouter / retirer
                <input id="coinsDelta" type="number" step="1" value="0" />
              </label>
              <label>Rerolls à ajouter / retirer
                <input id="rerollsDelta" type="number" step="1" value="0" />
              </label>
            </div>
            <label>Quota cartes autorisées
              <input id="cardCreationLimit" type="number" min="1" step="1" placeholder="Ex: 3" />
            </label>
            <button id="accountCreditSubmit" type="submit">Appliquer</button>
          </form>
          <p id="accountCreditFeedback" class="hint" aria-live="polite"></p>
        </section>
      </aside>
    </div>
  </section>

  <section class="panel glass admin-history-panel admin-history-panel--revamp">
    <div class="section-head-inline section-head-inline--stack-mobile">
      <div>
        <h3 class="section-title">Historique</h3>
      </div>
      <div class="toolbar toolbar--revamp">
        <label>Statut
          <select id="statusFilter">
            <option value="all">Tous</option>
            <option value="pending">pending</option>
            <option value="approved">approved</option>
            <option value="rejected">rejected</option>
          </select>
        </label>
        <label>Recherche
          <input id="searchInput" type="search" placeholder="Pseudo, nom, rôle" />
        </label>
      </div>
    </div>
    <div id="verificationCards" class="pending-list pending-list--dashboard pending-list--revamp"></div>
  </section>

  <section class="panel glass admin-history-panel admin-history-panel--revamp">
    <div class="section-head-inline section-head-inline--stack-mobile">
      <div>
        <h3 class="section-title">Gestion des cartes validées</h3>
        <p id="managedStats" class="hint">0 cartes validées · 0 possessions profil synchronisées</p>
      </div>
      <div class="toolbar toolbar--revamp">
        <label>Recherche
          <input id="managedSearchInput" type="search" placeholder="Card ID, numéro, créateur, possesseur" />
        </label>
      </div>
    </div>
    <div id="managedCards" class="managed-card-list" aria-live="polite"></div>
  </section>
</main>
