<main class="layout layout--create layout--create-revamp layout--create-minimal">
  <section class="panel glass editor-panel editor-panel--revamp">
    <div class="panel-heading panel-heading--spread panel-heading--editor">
      <div>
        <h2>Nouvelle carte</h2>
      </div>
    </div>

    <form id="cardForm" class="editor-form editor-form--revamp">
      <div class="editor-form__cluster glass-soft">
        <div class="form-grid form-grid--two">
          <label>Nom
            <input id="name" type="text" maxlength="24" value="Fémi-Mars" required />
          </label>

          <label>Rôle
            <select id="title" required>
              <option value="viewer">Viewer</option>
              <option value="streamer">Streamer</option>
              <option value="responsable staff">Responsable staff</option>
              <option value="gardien de l’AFC">Gardien de l’AFC</option>
            </select>
          </label>
        </div>

        <div class="form-grid form-grid--two">
          <label>Édition
            <input id="edition" type="text" value="2e édition" readonly />
          </label>

          <label>Image
            <input id="imageInput" type="file" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" />
          </label>
        </div>
      </div>

      <section class="portrait-position-tools glass-soft" aria-labelledby="portraitPositionTitle">
        <div class="section-head-inline section-head-inline--stack-mobile">
          <div>
            <h3 id="portraitPositionTitle">Rognage</h3>
          </div>
          <div class="portrait-position-actions">
            <button type="button" id="openPortraitCropModal" class="ghost">Rogner</button>
            <button type="button" id="resetPortraitPosition" class="ghost">Réinitialiser</button>
          </div>
        </div>
      </section>

      <label>Capacités
        <textarea id="abilities" rows="5" required></textarea>
      </label>

      <section class="stat-controls glass-soft" id="statControls">
        <div class="section-head-inline">
          <div>
            <h3>Stats</h3>
          </div>
          <span class="section-pill" id="rerollBadge">3 rerolls</span>
        </div>
        <p class="subtitle" id="rerollStatusText">Connecte-toi pour voir tes rerolls.</p>
        <div class="form-grid form-grid--two" id="manualStatsBox" hidden>
          <label>Attaque
            <input id="manualAttack" type="number" min="1" max="100" step="1" value="1" />
          </label>
          <label>Défense
            <input id="manualDefense" type="number" min="1" max="100" step="1" value="1" />
          </label>
        </div>
      </section>

      <div class="actions actions--spread actions--editor">
        <button type="button" id="rollStats">Générer les stats</button>
        <button type="button" id="submitCard">Envoyer</button>
        <button type="button" id="downloadCard" class="ghost">Télécharger</button>
      </div>

      <section class="verification-box verification-box--minimal" id="verificationBox">
        <div class="section-head-inline">
          <div>
            <h3>Vérification</h3>
          </div>
        </div>
        <p id="verificationStatusText">Connecte-toi pour suivre ta carte.</p>
        <p id="renderEngineStatus" class="render-engine-status">Export en cours d'initialisation...</p>
      </section>
    </form>
  </section>

  <section class="preview-column preview-column--revamp">
    <article class="panel glass preview-panel preview-panel--revamp">
      <div class="panel-heading panel-heading--compact">
        <div>
          <h2>Aperçu</h2>
        </div>
      </div>

      <div class="preview-wrap preview-wrap--stage">
        <article class="afc-card rank-D" id="afcCard">
          <div class="card-spectrum" aria-hidden="true"></div>
          <div class="card-frame-lines" aria-hidden="true"></div>
          <div class="holo"></div>
          <div class="rank-aura" aria-hidden="true"></div>
          <div class="card-noise" aria-hidden="true"></div>

          <div class="card-corner card-corner--tl" aria-hidden="true"></div>
          <div class="card-corner card-corner--tr" aria-hidden="true"></div>
          <div class="card-corner card-corner--bl" aria-hidden="true"></div>
          <div class="card-corner card-corner--br" aria-hidden="true"></div>

          <header class="card-header">
            <div class="meta-left">
              <span id="cardCost">2</span>
              <small>Coût</small>
            </div>

            <div class="identity identity--hero">
              <div class="identity-ribbon">
                <span class="type-chip" id="cardTypeTop">équilibré</span>
              </div>
              <h3 id="cardName">Fémi-Mars</h3>
              <p id="cardTitle">Responsable staff</p>
            </div>

            <div class="meta-right">
              <span id="cardRank">C</span>
              <small><strong id="cardAverage">32</strong></small>
            </div>
          </header>

          <section class="portrait-shell">
            <span class="edition-chip" id="cardEdition">2e édition</span>

            <div class="portrait" id="portrait">
              <img class="portrait-image" id="portraitImage" alt="" hidden />
              <div class="portrait-overlay" aria-hidden="true"></div>
            </div>
          </section>

          <section class="card-body">
            <section class="skills">
              <div class="skills-head">
                <div class="section-label">Capacités</div>
              </div>
              <p id="cardAbilities"></p>
            </section>

            <footer class="stats">
              <div class="stat-card stat-card--attack">
                <div class="stat-card__glow" aria-hidden="true"></div>
                <div class="stat-card__row">
                  <strong aria-label="Attaque">
                    <span class="stat-icon stat-icon--attack" aria-hidden="true">
                      <svg viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg" focusable="false">
                        <path d="M762-96 645-212l-88 88-28-28q-23-23-23-57t23-57l169-169q23-23 57-23t57 23l28 28-88 88 116 117q12 12 12 28t-12 28l-50 50q-12 12-28 12t-28-12Zm118-628L426-270l5 4q23 23 23 57t-23 57l-28 28-88-88L198-96q-12 12-28 12t-28-12l-50-50q-12-12-12-28t12-28l116-117-88-88 28-28q23-23 57-23t57 23l4 5 454-454h160v160ZM278-526 80-724v-160h160l198 198-160 160Z" />
                      </svg>
                    </span>
                  </strong>
                  <span class="stat-value" id="attack">0</span>
                </div>
              </div>
              <div class="stat-card stat-card--defense">
                <div class="stat-card__glow" aria-hidden="true"></div>
                <div class="stat-card__row">
                  <span class="stat-value" id="defense">0</span>
                  <strong aria-label="Défense">
                    <span class="stat-icon stat-icon--defense" aria-hidden="true">
                      <svg viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg" focusable="false">
                        <path d="M480-80q-139-35-229.5-159.5T160-516v-244l320-120 320 120v244q0 152-90.5 276.5T480-80Z" />
                      </svg>
                    </span>
                  </strong>
                </div>
              </div>
            </footer>
          </section>
        </article>
      </div>
    </article>
  </section>

  <div class="crop-modal" id="portraitCropModal" hidden>
    <div class="crop-modal__backdrop" data-close-portrait-modal></div>
    <div class="crop-modal__dialog glass" role="dialog" aria-modal="true" aria-labelledby="portraitCropModalTitle">
      <div class="crop-modal__header section-head-inline section-head-inline--stack-mobile">
        <div>
          <h3 id="portraitCropModalTitle">Rognage</h3>
        </div>
        <button type="button" id="closePortraitCropModal" class="ghost">Fermer</button>
      </div>

      <div class="crop-modal__content">
        <div class="crop-modal__frame-wrap">
          <div class="crop-frame" id="portraitCropFrame">
            <img class="crop-frame__image" id="portraitCropImage" alt="Aperçu du rognage de l’illustration" hidden />
            <div class="crop-frame__overlay" aria-hidden="true"></div>
          </div>
        </div>

        <div class="crop-modal__sidebar glass-soft">
          <div class="portrait-zoom-controls" aria-label="Contrôles de zoom de la pop-up d'illustration">
            <button type="button" id="cropZoomOutPortrait" class="ghost portrait-zoom-button" aria-label="Dézoomer l'illustration">−</button>
            <label class="portrait-zoom-slider" for="cropPortraitZoomRange">Zoom
              <input id="cropPortraitZoomRange" type="range" min="1" max="3" step="0.05" value="1" />
            </label>
            <button type="button" id="cropZoomInPortrait" class="ghost portrait-zoom-button" aria-label="Zoomer l'illustration">+</button>
            <span id="cropPortraitZoomValue" class="section-pill portrait-zoom-value">100%</span>
          </div>
          <div class="crop-modal__actions">
            <button type="button" id="resetPortraitCropModal" class="ghost">Recentrer</button>
            <button type="button" id="cancelPortraitCropModal" class="ghost">Annuler</button>
            <button type="button" id="applyPortraitCropModal">Appliquer</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
