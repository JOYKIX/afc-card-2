<main class="single-layout single-layout--booster-revamp single-layout--booster-minimal">
  <section class="panel glass panel--booster panel--booster-revamp">
    <div class="panel-heading panel-heading--spread panel-heading--booster">
      <div>
        <h2>Booster</h2>
      </div>
      <div class="hero-chips hero-chips--stacked">
        <span id="catalogCount">0 carte validée</span>
        <span id="boosterCoins">50 coins</span>
      </div>
    </div>

    <div class="booster-dashboard booster-dashboard--minimal">
      <aside class="booster-sidebar booster-sidebar--minimal">
        <div class="hero-stats hero-stats--booster">
          <article class="glass-soft">
            <strong>50 coins</strong>
            <span>Le booster</span>
          </article>
          <article class="glass-soft">
            <strong>+50 / jour</strong>
            <span id="dailyRewardStatus">Connecte-toi pour tes coins quotidiens.</span>
          </article>
        </div>

        <div class="profile-card glass-soft booster-rates-card">
          <h3>Taux</h3>
          <ul id="dropRateList" class="feature-list feature-list--compact">
            <li>Chargement...</li>
          </ul>
        </div>
      </aside>

      <section class="booster-main-stage">
        <div class="panel-heading panel-heading--spread panel-heading--compact-mobile">
          <p id="boosterHint" class="hint">Prêt.</p>
          <button id="openBooster" type="button">Ouvrir</button>
        </div>
        <section class="booster-stage booster-stage--revamp" id="boosterStage">
          <div class="booster-pack" id="boosterPack" aria-hidden="true">
            <div class="booster-pack__glow"></div>
            <div class="booster-pack__shell">
              <span class="booster-pack__brand">AFC</span>
              <span class="booster-pack__count">x5</span>
            </div>
            <div class="booster-pack__burst"></div>
          </div>
          <section id="boosterGrid" class="booster-grid booster-grid--revamp"></section>
        </section>
      </section>
    </div>
  </section>
</main>

<div class="card-viewer" id="boosterViewer" hidden>
  <div class="card-viewer__backdrop" data-close-booster-viewer></div>
  <div class="card-viewer__dialog glass" role="dialog" aria-modal="true" aria-labelledby="boosterViewerTitle">
    <button type="button" class="card-viewer__close ghost" id="closeBoosterViewer">Fermer</button>
    <div class="card-viewer__media rank-C" id="boosterViewerMedia">
      <img id="boosterViewerImage" alt="" />
    </div>
    <div class="card-viewer__meta">
      <p class="eyebrow" id="boosterViewerRank">Rang</p>
      <h3 id="boosterViewerTitle">Carte</h3>
      <p id="boosterViewerSubtitle" class="subtitle"></p>
    </div>
  </div>
</div>

<div class="booster-opening-modal" id="boosterOpeningModal" hidden>
  <div class="booster-opening-modal__backdrop" data-close-booster-opening></div>
  <div
    class="booster-opening-modal__dialog glass"
    id="boosterOpeningDialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="boosterOpeningTitle"
    aria-describedby="boosterOpeningStatus"
  >
    <div class="booster-opening-modal__fx">
      <span class="booster-opening-modal__halo"></span>
      <span class="booster-opening-modal__halo booster-opening-modal__halo--alt"></span>
      <span class="booster-opening-modal__particles"></span>
    </div>

    <div class="booster-opening-modal__topbar">
      <div>
        <p class="eyebrow">Ouverture spectaculaire</p>
        <h3 id="boosterOpeningTitle">AFC Booster Reactor</h3>
      </div>
      <button type="button" class="ghost booster-opening-modal__close" id="closeBoosterOpening">Fermer</button>
    </div>

    <div class="booster-opening-modal__core">
      <div class="booster-opening-modal__pack" id="boosterOpeningPack" aria-hidden="true">
        <span class="booster-opening-modal__pack-ring"></span>
        <span class="booster-opening-modal__pack-core"></span>
        <span class="booster-opening-modal__pack-label">DROP</span>
      </div>

      <div class="booster-opening-modal__content">
        <p class="booster-opening-modal__status" id="boosterOpeningStatus">Initialisation du portail...</p>
        <div class="booster-opening-modal__spotlight" id="boosterOpeningSpotlight">
          <span class="booster-opening-modal__spotlight-rank" id="boosterOpeningSpotlightRank">?</span>
          <strong id="boosterOpeningSpotlightLabel">Rareté inconnue</strong>
          <small id="boosterOpeningSpotlightText">Les énergies du booster se chargent…</small>
        </div>
        <div class="booster-opening-modal__rarities" id="boosterRarityTrack" aria-live="polite"></div>
      </div>
    </div>
  </div>
</div>
