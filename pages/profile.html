<main class="single-layout single-layout--narrow single-layout--profile-revamp single-layout--profile-hub">
  <section class="panel glass profile-panel profile-panel--revamp profile-panel--hub">
    <div class="panel-heading panel-heading--spread page-hero page-hero--profile">
      <div>
        <h2>Profil</h2>
      </div>
    </div>

    <div class="hero-stats hero-stats--profile hero-stats--profile-minimal hero-stats--hub">
      <article class="glass-soft">
        <strong id="profileCoins">50 coins</strong>
        <span>Coins</span>
      </article>
      <article class="glass-soft">
        <strong id="profileDaily">+50 coins / jour</strong>
        <span>Connexion</span>
      </article>
      <article class="glass-soft">
        <strong id="profileDrops">0 carte drop</strong>
        <span>Collection</span>
      </article>
    </div>

    <div class="profile-layout profile-layout--revamp profile-layout--single profile-layout--hub">
      <div class="profile-form-wrap profile-form-wrap--primary glass-soft">
        <label>Pseudo
          <input id="nickname" type="text" maxlength="24" placeholder="Ton pseudo AFC" />
        </label>
        <button id="saveProfile" type="button">Enregistrer</button>
        <p id="profileHint" class="hint">Connecte-toi avec Google.</p>
      </div>
    </div>
  </section>
</main>
