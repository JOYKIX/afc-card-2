<main class="single-layout single-layout--album-revamp single-layout--binder-room">
  <section class="panel glass panel--album panel--album-binder panel--album-revamp panel--binder-room">
    <div class="panel-heading panel-heading--spread panel-heading--album page-hero page-hero--album">
      <div>
        <h2>Album</h2>
      </div>
      <div class="album-heading__stats album-heading__stats--revamp album-heading__stats--binder-room">
        <span id="albumCount" class="section-pill">0 / 0 carte</span>
        <span id="albumPageIndicator" class="section-pill section-pill--ghost">Page 1 / 1</span>
      </div>
    </div>
    <p id="albumHint" class="hint">Chargement...</p>

    <section class="album-binder album-binder--revamp album-binder--binder-room" aria-label="Classeur de cartes">
      <div class="album-binder__topbar album-binder__topbar--revamp album-binder__topbar--binder-room">
        <div class="album-binder__controls">
          <button type="button" class="ghost" id="albumPrevPage">← Précédente</button>
          <button type="button" class="ghost" id="albumNextPage">Suivante →</button>
        </div>
      </div>

      <div class="album-binder__shell album-binder__shell--revamp album-binder__shell--binder-room">
        <div class="album-binder__spine" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <section id="albumGrid" class="album-grid album-grid--binder album-grid--revamp album-grid--binder-room" aria-live="polite"></section>
      </div>
    </section>
  </section>
</main>

<div class="card-viewer" id="albumViewer" hidden>
  <div class="card-viewer__backdrop" data-close-album-viewer></div>
  <div class="card-viewer__dialog glass" role="dialog" aria-modal="true" aria-labelledby="albumViewerTitle">
    <button type="button" class="card-viewer__close ghost" id="closeAlbumViewer">Fermer</button>
    <div class="card-viewer__media rank-C" id="albumViewerMedia">
      <img id="albumViewerImage" alt="" />
    </div>
    <div class="card-viewer__meta">
      <p class="eyebrow" id="albumViewerRank">Rang</p>
      <h3 id="albumViewerTitle">Carte</h3>
      <p id="albumViewerSubtitle" class="subtitle"></p>
    </div>
  </div>
</div>
